<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polybot Dashboard</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-color: #050505;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #8a8d98;
      --accent-cyan: #00f0ff;
      --accent-purple: #8a2be2;
      --accent-green: #00ff88;
      --accent-red: #ff3366;
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient Orbs */
    .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: var(--bg-color); }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: float 20s ease-in-out infinite alternate; }
    .orb-1 { width: 600px; height: 600px; background: var(--accent-purple); top: -200px; left: -100px; }
    .orb-2 { width: 500px; height: 500px; background: var(--accent-cyan); bottom: -100px; right: -100px; animation-delay: -5s; }
    .orb-3 { width: 400px; height: 400px; background: var(--accent-green); top: 30%; left: 40%; opacity: 0.15; animation-delay: -10s; }
    
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

    /* Glass Utilities */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }
    .glass-panel:hover { border-color: var(--glass-highlight); background: rgba(255, 255, 255, 0.05); }

    .glass-pill {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    h1, h2, h3, .metric-value { font-family: var(--font-display); letter-spacing: -0.02em; }
    .glow-text-green { color: var(--accent-green); text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
    .glow-text-red { color: var(--accent-red); text-shadow: 0 0 20px rgba(255, 51, 102, 0.4); }

    #root { display: flex; flex-direction: column; min-height: 100vh; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
    .pulse-active { animation: pulse-ring 2s infinite; }
    
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
    
    button { font-family: var(--font-sans); }
  </style>
</head>
<body>

  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Components ---

    function KillSwitch({ active, onToggle }) {
      const [loading, setLoading] = useState(false);

      const handleToggle = async () => {
        setLoading(true);
        await onToggle(!active);
        setLoading(false);
      };

      return (
        <div className="glass-panel" style={{ padding: '24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '32px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
            <div style={{ 
              width: '48px', height: '48px', borderRadius: '12px', 
              background: active ? 'rgba(255, 51, 102, 0.1)' : 'rgba(0, 255, 136, 0.1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: active ? 'var(--accent-red)' : 'var(--accent-green)',
            }}>
              <i data-lucide={active ? "shield-alert" : "shield-check"}></i>
            </div>
            <div>
              <h3 style={{ fontSize: '1.2rem', marginBottom: '4px' }}>Risk Manager</h3>
              <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>
                {active ? 'Trading suspended. All orders cancelled.' : 'System active and protecting capital.'}
              </p>
            </div>
          </div>

          <button
            onClick={handleToggle}
            disabled={loading}
            style={{
              background: active ? 'rgba(0, 255, 136, 0.1)' : 'rgba(255, 51, 102, 0.1)',
              color: active ? 'var(--accent-green)' : 'var(--accent-red)',
              border: `1px solid ${active ? 'rgba(0, 255, 136, 0.3)' : 'rgba(255, 51, 102, 0.3)'}`,
              padding: '12px 24px',
              borderRadius: '12px',
              fontWeight: 600,
              cursor: loading ? 'wait' : 'pointer',
              transition: 'all 0.2s',
              display: 'flex',
              alignItems: 'center',
              gap: '8px'
            }}
          >
            <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'currentColor', boxShadow: `0 0 10px currentColor` }}></div>
            {loading ? 'Processing...' : active ? 'RESUME TRADING' : 'ENGAGE KILL SWITCH'}
          </button>
        </div>
      );
    }

    function StatsOverview({ status }) {
      if (!status) return null;

      const formatUptime = (ms) => {
        const hours = Math.floor(ms / 3600000);
        const minutes = Math.floor((ms % 3600000) / 60000);
        return `${hours}h ${minutes}m`;
      };

      const isPositive = status.dailyPnl >= 0;

      return (
        <div className="grid-4" style={{ marginBottom: '32px' }}>
          <div className="glass-panel" style={{ padding: '24px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
              <i data-lucide="dollar-sign" style={{ color: "var(--accent-green)", width: 18, height: 18 }}></i>
              <span style={{ fontSize: '0.9rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '1px' }}>Daily P&L</span>
            </div>
            <div className={`metric-value ${isPositive ? 'glow-text-green' : 'glow-text-red'}`} style={{ fontSize: '2.5rem', fontWeight: 700 }}>
              {isPositive ? '+' : '-'}${Math.abs(status.dailyPnl).toFixed(2)}
            </div>
          </div>

          <div className="glass-panel" style={{ padding: '24px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
              <i data-lucide="activity" style={{ color: "var(--accent-cyan)", width: 18, height: 18 }}></i>
              <span style={{ fontSize: '0.9rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '1px' }}>Active Markets</span>
            </div>
            <div className="metric-value" style={{ fontSize: '2.5rem', fontWeight: 700 }}>
              {status.activeMarkets}
            </div>
          </div>

          <div className="glass-panel" style={{ padding: '24px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
              <i data-lucide="shopping-cart" style={{ color: "var(--accent-purple)", width: 18, height: 18 }}></i>
              <span style={{ fontSize: '0.9rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '1px' }}>Capital Deployed</span>
            </div>
            <div className="metric-value" style={{ fontSize: '2.5rem', fontWeight: 700 }}>
              {typeof status.capitalDeployed === 'string' ? status.capitalDeployed : `$${status.capitalDeployed}`}
            </div>
          </div>

          <div className="glass-panel" style={{ padding: '24px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', color: 'var(--text-secondary)', marginBottom: '16px' }}>
              <i data-lucide="clock" style={{ color: "#FFB800", width: 18, height: 18 }}></i>
              <span style={{ fontSize: '0.9rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '1px' }}>Uptime & Activity</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              <div className="metric-value" style={{ fontSize: '1.8rem', fontWeight: 700 }}>
                {formatUptime(status.uptime)}
              </div>
              <div style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>
                {status.liveOrders} live orders • {status.fillsToday} fills today
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MarketCard({ market }) {
      const isSkewed = market.inventorySkew > 0.6;
      
      return (
        <div className="glass-panel" style={{ padding: '24px', display: 'flex', flexDirection: 'column', gap: '20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px' }}>
            <h3 style={{ fontSize: '1.1rem', lineHeight: '1.4', margin: 0 }}>{market.question}</h3>
            {market.paused ? (
              <span className="glass-pill" style={{ color: 'var(--accent-red)', borderColor: 'rgba(255, 51, 102, 0.3)' }}>Paused</span>
            ) : (
              <span className="glass-pill" style={{ color: 'var(--accent-cyan)', borderColor: 'rgba(0, 240, 255, 0.3)' }}>Active</span>
            )}
          </div>

          <div className="grid-2">
            <div>
              <p style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: '4px' }}>Daily Reward Pool</p>
              <p style={{ fontSize: '1.2rem', fontWeight: 600, color: 'var(--accent-purple)' }}>
                ${market.rewardPool ? market.rewardPool.toFixed(2) : '0.00'}
              </p>
            </div>
            <div>
              <p style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: '4px' }}>Midpoint Price</p>
              <p style={{ fontSize: '1.2rem', fontWeight: 600 }}>
                ${market.midpoint ? market.midpoint.toFixed(3) : '0.000'}
              </p>
            </div>
          </div>

          <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: '12px', padding: '16px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <i data-lucide="layers" style={{ color: "var(--text-secondary)", width: 16, height: 16 }}></i>
                <span style={{ fontSize: '0.9rem', color: 'var(--text-secondary)' }}>Inventory Skew</span>
              </div>
              {isSkewed && <i data-lucide="alert-triangle" style={{ color: "var(--accent-red)", width: 16, height: 16 }}></i>}
            </div>
            
            <div style={{ width: '100%', height: '6px', background: 'rgba(255,255,255,0.1)', borderRadius: '3px', position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: '50%', width: '1px', background: 'rgba(255,255,255,0.3)', zIndex: 2 }}></div>
              <div style={{
                position: 'absolute', top: 0, bottom: 0,
                left: market.netInventory < 0 ? `${50 - (market.inventorySkew * 50)}%` : '50%',
                width: `${market.inventorySkew * 50}%`,
                background: isSkewed ? 'var(--accent-red)' : 'var(--accent-cyan)',
                borderRadius: '3px', transition: 'all 0.3s ease'
              }}></div>
            </div>
            
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '8px', fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
              <span>Long NO</span>
              <span>{market.netInventory > 0 ? `+${market.netInventory} YES` : market.netInventory < 0 ? `${market.netInventory} NO` : 'Balanced'}</span>
              <span>Long YES</span>
            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: '1px solid var(--glass-border)', paddingTop: '16px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
              <i data-lucide="activity" style={{ color: "var(--text-secondary)", width: 14, height: 14 }}></i>
              <span style={{ fontSize: '0.9rem', color: 'var(--text-secondary)' }}>{market.liveOrders.length} Live Orders</span>
            </div>
            <div style={{ fontSize: '0.9rem', color: 'var(--text-secondary)' }}>
              Spread: {(market.spread * 100).toFixed(1)}¢
            </div>
          </div>
        </div>
      );
    }

    // --- Main App ---

    function App() {
      const [status, setStatus] = useState(null);
      const [markets, setMarkets] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchData = async () => {
        try {
          const [statusRes, marketsRes] = await Promise.all([
            fetch('/api/status'),
            fetch('/api/markets')
          ]);
          
          if (!statusRes.ok || !marketsRes.ok) throw new Error('API Error');
          
          const statusData = await statusRes.json();
          const marketsData = await marketsRes.json();
          
          setStatus(statusData);
          setMarkets(marketsData);
          setError(null);
        } catch (err) {
          console.error(err);
          setError('Connection to bot lost. Is the bot running?');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 3000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }); // Run after every render to catch new icons

      const toggleKillSwitch = async (activate) => {
        try {
          await fetch('/api/kill-switch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ activate }),
          });
          fetchData();
        } catch (err) {
          console.error('Failed to toggle kill switch', err);
        }
      };

      if (loading && !status) {
        return (
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' }}>
            <div className="pulse-active" style={{ width: 40, height: 40, background: 'var(--accent-cyan)', borderRadius: '50%' }}></div>
          </div>
        );
      }

      return (
        <React.Fragment>
          <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '40px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
              <div style={{ 
                width: 48, height: 48, borderRadius: 16, 
                background: 'linear-gradient(135deg, var(--accent-cyan), var(--accent-purple))',
                display: 'flex', justifyContent: 'center', alignItems: 'center',
                boxShadow: '0 0 20px rgba(0, 240, 255, 0.4)'
              }}>
                <i data-lucide="zap" style={{ color: "#fff", width: 24, height: 24 }}></i>
              </div>
              <div>
                <h1 style={{ fontSize: '1.8rem', margin: 0, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px' }}>
                  Poly<span style={{ color: 'var(--accent-cyan)' }}>bot</span>
                </h1>
                <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginTop: '4px' }}>
                  Liquidity Reward Engine
                </p>
              </div>
            </div>
            
            {status?.isDryRun && (
              <div className="glass-pill pulse-active" style={{ color: '#FFB800', borderColor: 'rgba(255, 184, 0, 0.3)' }}>
                🧪 DRY RUN MODE
              </div>
            )}
          </header>

          {error ? (
            <div className="glass-panel" style={{ padding: '24px', textAlign: 'center', color: 'var(--accent-red)', borderColor: 'rgba(255, 51, 102, 0.3)' }}>
              <h3>Connection Error</h3>
              <p>{error}</p>
            </div>
          ) : (
            <main>
              <StatsOverview status={status} />
              <KillSwitch active={status?.killSwitchActive || false} onToggle={toggleKillSwitch} />

              <h2 style={{ fontSize: '1.5rem', marginBottom: '24px', fontWeight: 600 }}>Active Markets ({markets.length})</h2>
              
              <div className="grid-cards">
                {markets.map(market => (
                  <MarketCard key={market.id} market={market} />
                ))}
                {markets.length === 0 && (
                  <p style={{ color: 'var(--text-secondary)' }}>No active markets currently being farmed.</p>
                )}
              </div>
            </main>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
